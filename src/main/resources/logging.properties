# JBoss Log Manager configuration

# Root logger level
logger.level=INFO

# Console handler
handler.CONSOLE=org.jboss.logmanager.handlers.ConsoleHandler
handler.CONSOLE.level=ALL
handler.CONSOLE.formatter=COLOR
handler.CONSOLE.properties=autoFlush,target
handler.CONSOLE.autoFlush=true
handler.CONSOLE.target=SYSTEM_ERR

# Color pattern formatter
formatter.COLOR=org.jboss.logmanager.formatters.ColorPatternFormatter
formatter.COLOR.properties=pattern
formatter.COLOR.pattern=%d{HH:mm:ss,SSS} %-5p [%c{1}] %s%e%n

# Root logger handlers
logger.handlers=CONSOLE

# Application logger
logger.io.quarkiverse.acp.level=INFO

# ACP client logger
logger.io.quarkiverse.agentclientprotocol.level=INFO
